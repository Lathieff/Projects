name: farmer_app
description: A farmer assistance mobile application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.2
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
 

  flutter_localizations:
    sdk: flutter
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  geocoding: ^4.0.0
  speech_to_text: ^7.3.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  iconify_flutter: ^0.0.7
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/weather/
    - assets/weather/gifs/
    - assets/gif/
    - assets/icon/
    - assets/
    - assets/images/timeline/
    - assets/equip/
    - assets/equip/profile/
    
    